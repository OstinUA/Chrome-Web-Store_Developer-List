<section class="profile">
    <div class="profile-text">
        <h1>{{ site.profile.name }}</h1>
        <div class="subtitle">{{ site.profile.subtitle }}</div>
        <p>{{ site.profile.bio }}</p>
    </div>
    <img src="{{ site.profile.avatar }}" alt="{{ site.profile.name }} avatar" class="profile-avatar">
</section>
